name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: leaflash-linux-amd64
            use_zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: leaflash-linux-aarch64
            use_zig: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: leaflash-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: leaflash-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: leaflash-win-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Bump Cargo.toml version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Replace the first `version = "..."` in Cargo.toml (the [package] one)
          python3 - "$VERSION" <<'PY'
          import re, sys
          v = sys.argv[1]
          with open("Cargo.toml") as f:
              s = f.read()
          s = re.sub(r'^version\s*=\s*"[^"]*"', f'version = "{v}"', s, count=1, flags=re.M)
          with open("Cargo.toml", "w") as f:
              f.write(s)
          print(f"Set crate version to {v}")
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ---------- Linux musl via cargo-zigbuild ----------
      # zig provides a self-contained C cross-toolchain (incl. musl libc and
      # Linux kernel headers) for both x86_64 and aarch64 musl targets, so
      # libusb1-sys's vendored build compiles cleanly without symlink hacks.
      - name: Setup zig
        if: matrix.use_zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install --locked cargo-zigbuild

      # ---------- Build ----------
      - name: Build (zigbuild)
        if: matrix.use_zig
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.use_zig'
        run: cargo build --release --target ${{ matrix.target }}

      # ---------- Strip ----------
      - name: Strip (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: strip "target/${{ matrix.target }}/release/leaflash" || true

      # ---------- Rename to friendly per-target name (no compression) ----------
      - name: Rename binary
        id: pkg
        shell: bash
        run: |
          mkdir -p dist
          ASSET="dist/${{ matrix.asset }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/leaflash.exe" "$ASSET"
          else
            cp "target/${{ matrix.target }}/release/leaflash" "$ASSET"
          fi
          echo "asset=$ASSET" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ steps.pkg.outputs.asset }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
